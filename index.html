<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chấm công QR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="text-align:center;font-family:sans-serif;background:#f5f5f5;padding-top:50px">

<h2>📲 Chấm công</h2>
<div id="result">Đang xử lý...</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) {
    document.getElementById("result").innerText = "❌ Thiếu ID!";
  } else {

    const api = "https://script.google.com/macros/s/AKfycbwsjdqyJ6_lECYTuItWAaGg2X2pVeM5N0js3BG4swJ3uNvxubxk8huXiqWozIReLTB7/exec?id=" + id;

    fetch(api)
      .then(res => res.json())
      .then(data => {

        if (data.status === "success") {

          let color = (data.type === "IN") ? "green" : "red";

          document.getElementById("result").innerHTML = `
            <h2 style="color:${color}">✅ ${data.name}</h2>
            <p>${data.type === "IN" ? "🟢 Vào làm" : "🔴 Tan ca"}</p>
          `;

        } else {
          document.getElementById("result").innerText = "❌ " + data.msg;
        }

      })
      .catch(err => {
        document.getElementById("result").innerText = "❌ Lỗi kết nối!";
      });

  }
</script>

</body>
</html>

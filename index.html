<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chấm công</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="margin:0">

<iframe id="frame" style="width:100%;height:100vh;border:none;"></iframe>

<script>
  const id = new URLSearchParams(window.location.search).get("id");

  if (!id) {
    document.body.innerHTML = "<h3>❌ Thiếu ID</h3>";
  } else {
    const api = "https://script.google.com/macros/s/AKfycbxtMw8sV6CpQIHc4kNf3PSADNXGAeHCZxj1JtRI-dSAPDc3iv4r_jD-8FK1Ax-gCPti/exec?id=" + id;
    document.getElementById("frame").src = api;
  }
</script>

</body>
</html>

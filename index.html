<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chấm công</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="text-align:center;font-family:sans-serif;background:#f5f5f5">

<h2>📲 Đang chấm công...</h2>
<p id="status">Vui lòng chờ...</p>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) {
    document.getElementById("status").innerText = "❌ Thiếu ID!";
  } else {

    const api = "https://script.google.com/macros/s/AKfycbwsjdqyJ6_lECYTuItWAaGg2X2pVeM5N0js3BG4swJ3uNvxubxk8huXiqWozIReLTB7/exec?id=NV001" + id;

fetch(api, { mode: "no-cors" })
  .then(() => {
    document.getElementById("status").innerText = "✅ Đã chấm công";
  })
  .catch(() => {
    document.getElementById("status").innerText = "❌ Lỗi kết nối!";
  });
  }
</script>

</body>
</html>
